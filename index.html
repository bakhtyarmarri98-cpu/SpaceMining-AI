<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPACEMINING AI - Authentication</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">

    <div class="stars"></div>
    <div class="twinkling"></div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="rocket-icon">
                <i class="fas fa-rocket text-neon-blue"></i>
            </div>
            <h1 class="brand-title">SPACEMINING <span class="text-neon-blue">AI</span></h1>
            <p class="brand-subtitle">AI Token Mining Platform</p>
        </div>

        <div class="auth-card">
            <div class="auth-tabs">
                <button id="tab-login" class="tab-btn active" onclick="switchTab('login')">Log In</button>
                <button id="tab-signup" class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
            </div>

            <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="login-email" placeholder="Enter your email" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-submit">
                    <span>Launch Dashboard</span> <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <form id="signup-form" class="auth-form hidden" onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="signup-name" placeholder="Enter full name" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="signup-email" placeholder="Enter valid email" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="signup-password" placeholder="Create strong password" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-shield-alt"></i> Confirm Password</label>
                    <input type="password" id="signup-confirm-password" placeholder="Repeat password" required>
                </div>
                <button type="submit" class="btn-submit btn-signup">
                    <span>Register Explorer ID</span> <i class="fas fa-user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const tabLogin = document.getElementById('tab-login');
            const tabSignup = document.getElementById('tab-signup');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                tabLogin.classList.remove('active');
                tabSignup.classList.add('active');
            }
        }

        // نیا رجسٹریشن سسٹم (لوکل ڈیٹا بیس)
        function handleSignup(event) {
            event.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value.toLowerCase().trim();
            const password = document.getElementById('signup-password').value;
            const confirmPassword = document.getElementById('signup-confirm-password').value;

            if (password !== confirmPassword) {
                alert("Error: Passwords do not match!");
                return;
            }

            // یوزرز کا ڈیٹا لوکل سٹوریج میں سیو کرنا
            let users = JSON.parse(localStorage.getItem('mining_users')) || {};
            if (users[email] || email === "bakhtyarmarri2@gmail.com") {
                alert("Error: This email is already registered!");
                return;
            }

            users[email] = { name: name, password: password, balance: 0.00 };
            localStorage.setItem('mining_users', JSON.stringify(users));

            alert("Registration Successful, Explorer! Please Log In Now.");
            document.getElementById('signup-form').reset();
            switchTab('login');
        }

        // فکسڈ لاگ ان سسٹم
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('login-email').value.toLowerCase().trim();
            const password = document.getElementById('login-password').value;

            let users = JSON.parse(localStorage.getItem('mining_users')) || {};

            // ایڈمن لاگ ان چیک یا نئے یوزر کا لاگ ان چیک
            if ((email === "bakhtyarmarri2@gmail.com" && password === "Marri@123") || (users[email] && users[email].password === password)) {
                // سیشن سیو کرنا
                localStorage.setItem('current_user', email);
                window.location.href = "dashboard.html";
            } else {
                alert("Error: Invalid Email or Password!");
            }
        }
    </script>
</body>
</html>
